<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Colours Monster's Lunch - Pixar Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ✅ NUEVO: RESPONSIVE VOICE -->
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=YOUR_KEY"></script>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --pixar-blue: #3b82f6;
            --pixar-yellow: #fbbf24;
            --pixar-green: #22c55e;
            --pixar-red: #ef4444;
            --pixar-purple: #a855f7;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at center, #ffffff, #e2e8f0);
            overflow: hidden;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1, h2, h3, .title-font {
            font-family: 'Fredoka One', cursive;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            border-radius: 40px;
        }

        .float-anim {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        .monster-img {
            width: 280px;
            height: 280px;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .speech-bubble {
            position: relative;
            background: #fff;
            border-radius: 2rem;
            padding: 20px 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            border: 20px solid transparent;
            border-top-color: #fff;
            margin-left: -10px;
            margin-bottom: -20px;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--pixar-purple);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .pseudo-fullscreen {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            z-index: 9999 !important;
        }

        .hidden { display: none; }

        .pixar-btn:active { transform: scale(0.9); }
    </style>
</head>

<body class="p-4">

<!-- START -->
<div id="start-screen" class="text-center z-10 w-full max-w-2xl">
    <h1 class="text-6xl text-blue-600 mb-8">The Colours Monster's Lunch!</h1>
    <div class="flex flex-col gap-8 items-center">
        <div class="float-anim">
            <img src="monster.png" class="monster-img">
        </div>
        <button onclick="startGameWithFullscreen()" class="bg-blue-500 text-white text-3xl px-16 py-6 rounded-full">
            START!
        </button>
    </div>
</div>

<!-- GAME -->
<div id="game-container" class="hidden w-full h-full flex flex-col items-center justify-center">

    <div id="speech-bubble" class="speech-bubble mb-8 opacity-0">
        <p id="monster-text" class="text-2xl font-bold text-center">Hello!</p>
    </div>

    <div id="food-selection"></div>

    <div id="reaction-emoji" class="text-8xl opacity-0"></div>

    <div id="controls" class="hidden">
        <button onclick="handleResponse(true)">👍 I LIKE IT</button>
        <button onclick="handleResponse(false)">👎 I DON'T LIKE IT</button>
    </div>

</div>

<script>

const foods = [
    { name: "Banana", icon: "🍌" },
    { name: "Green Apple", icon: "🍏" },
    { name: "Milkshake", icon: "🥤" },
    { name: "Pizza", icon: "🍕" },
    { name: "Hamburger", icon: "🍔" },
    { name: "Pasta", icon: "🍝" },
    { name: "Ice Cream", icon: "🍦" },
    { name: "Yogurt", icon: "🥛" },
    { name: "Eggs", icon: "🥚" },
    { name: "Cheese", icon: "🧀" },
    { name: "Chocolate", icon: "🍫" },
    { name: "Sandwich", icon: "🥪" },
    { name: "Rice", icon: "🍚" },
    { name: "Potato", icon: "🥔" },
    { name: "Fish", icon: "🐟" },
    { name: "Bread", icon: "🍞" }
];

let currentIndex = 0;

function startGameWithFullscreen() {
    toggleFullScreen();

    // ✅ NUEVO: FRASE AL START
    speak("I'm the Colours Monster");

    initGame();
}

function toggleFullScreen() {
    document.documentElement.requestFullscreen().catch(()=>{});
}

// ✅ NUEVO: VOZ RESPONSIVEVOICE
function speak(text) {
    responsiveVoice.cancel();
    responsiveVoice.speak(text, "UK English Male", {
        pitch: 0.5,
        rate: 0.8
    });
}

function initGame() {
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-container').classList.remove('hidden');

    setTimeout(() => {
        document.getElementById('speech-bubble').classList.remove('opacity-0');
        nextItem();
    }, 500);
}

function nextItem() {
    if (currentIndex >= foods.length) return;

    const food = foods[currentIndex];

    document.getElementById('food-selection').innerHTML = `
        <div class="text-6xl">${food.icon}</div>
        <div>${food.name}</div>
    `;

    const text = `Do you like ${food.name.toLowerCase()}?`;
    updateBubble(text);
    speak(text);

    document.getElementById('controls').classList.remove('hidden');
}

function handleResponse(isLike) {
    const food = foods[currentIndex];
    const reaction = document.getElementById('reaction-emoji');

    reaction.textContent = isLike ? "😋" : "🤢";
    reaction.classList.remove("opacity-0");

    const msg = isLike
        ? `Yummy! I like ${food.name.toLowerCase()}!`
        : `Yuck! I don't like ${food.name.toLowerCase()}!`;

    updateBubble(msg);
    speak(msg);

    setTimeout(() => {
        reaction.classList.add("opacity-0");
        currentIndex++;
        nextItem();
    }, 3000);
}

function updateBubble(text) {
    document.getElementById('monster-text').textContent = text;
}

</script>

</body>
</html>
