<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Colours Monster's Lunch - Pro Edition</title>
    <!-- Bibliotecas externas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Biblioteca de voz ResponsiveVoice (Gratis para uso no comercial) -->
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=YOUR_KEY_HERE"></script>
    
    <style>
        :root {
            --pixar-blue: #3b82f6;
            --pixar-yellow: #fbbf24;
            --pixar-green: #22c55e;
            --pixar-red: #ef4444;
            --pixar-purple: #a855f7;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at center, #ffffff, #e2e8f0);
            overflow: hidden;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1, h2, h3 { font-family: 'Fredoka One', cursive; }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 1000px;
        }

        .slide {
            display: none;
            width: 100vw;
            height: 100vh;
            padding: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        .slide.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pixar-btn {
            padding: 15px 35px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: none;
            cursor: pointer;
        }

        .pixar-btn:active { transform: scale(0.95); }
        .btn-blue { background: var(--pixar-blue); }
        .btn-green { background: var(--pixar-green); }
        .btn-red { background: var(--pixar-red); }
        .btn-purple { background: var(--pixar-purple); }

        .nav-controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        .nav-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            color: var(--pixar-blue);
            font-size: 1.5rem;
            border: none;
        }

        .float-anim {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        .pseudo-fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9999 !important;
            background: radial-gradient(circle at center, #ffffff, #e2e8f0) !important;
        }

        .speech-bubble {
            position: relative;
            background: #fff;
            border-radius: 1.5em;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .food-icon { font-size: 8rem; }
    </style>
</head>
<body>

    <!-- Start Slide -->
    <div class="slide active" id="slide-0">
        <div class="text-center">
            <h1 class="text-7xl text-blue-600 mb-6 drop-shadow-lg leading-tight">Colours Monster!</h1>
            <p class="text-3xl text-gray-500 mb-12">Interactive Pixar Presentation</p>
            <div class="float-anim mb-12 text-9xl">👾</div>
            <button onclick="enterFullAndStart()" class="pixar-btn btn-blue text-2xl px-12 py-5 shadow-2xl">
                <i class="fa-solid fa-expand"></i> START PRESENTATION
            </button>
        </div>
    </div>

    <!-- Intro Slide -->
    <div class="slide" id="slide-1">
        <div class="glass-card p-12 flex flex-col md:flex-row gap-12 items-center">
            <div class="flex-1 text-center border-r border-gray-100 pr-12">
                <div class="text-9xl float-anim mb-8">👋</div>
                <button onclick="monsterSpeak('Hello friends! I am the Colours Monster. I am so hungry today!')" class="pixar-btn btn-purple">
                    <i class="fa-solid fa-volume-high"></i> LISTEN VOICE
                </button>
            </div>
            <div class="flex-1">
                <h2 class="text-5xl text-blue-600 mb-6 font-bold">Hello!</h2>
                <p class="text-3xl text-gray-700 font-bold">Learn: <br><br><span class="text-green-500">I LIKE</span> 👍<br><span class="text-red-500">I DON'T LIKE</span> 👎</p>
            </div>
        </div>
    </div>

    <!-- Food container -->
    <div id="food-slides-container"></div>

    <!-- Secret Slide -->
    <div class="slide" id="slide-secret">
        <div class="glass-card p-12 flex flex-col md:flex-row gap-12 items-center">
            <div class="flex-1 text-center border-r border-gray-100 pr-12">
                <div class="text-9xl float-anim mb-8">✨</div>
                <button onclick="tellSecret()" class="pixar-btn btn-purple">
                    <i class="fa-solid fa-volume-high"></i> MONSTER SECRET
                </button>
            </div>
            <div class="flex-1">
                <h2 class="text-5xl text-blue-600 mb-6 font-bold">A Secret!</h2>
                <p id="secret-text" class="text-3xl text-gray-700 italic">"Click the button to hear a secret!"</p>
            </div>
        </div>
    </div>

    <!-- Goodbye Slide -->
    <div class="slide" id="slide-goodbye">
        <div class="text-center">
            <div class="text-9xl float-anim mb-8">👋</div>
            <h2 class="text-7xl text-blue-600 mb-6 font-bold">Goodbye!</h2>
            <p class="text-3xl text-gray-500 mb-12">See you in the next lesson!</p>
            <button onclick="monsterSpeak('Goodbye everyone! Have a nice day!')" class="pixar-btn btn-blue text-2xl px-12 py-5 shadow-2xl">
                <i class="fa-solid fa-heart"></i> SAY GOODBYE
            </button>
        </div>
    </div>

    <!-- Navigation -->
    <div class="nav-controls">
        <button class="nav-btn" onclick="prevSlide()"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="nav-btn" onclick="nextSlide()"><i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <script>
        // Configuración de comidas
        const foods = [
            { name: "Banana", icon: "🍌", type: "like", speech: "Yummy! I like bananas!" },
            { name: "Green Apple", icon: "🍏", type: "dislike", speech: "Yuck! I do not like green apples!" },
            { name: "Milkshake", icon: "🥤", type: "like", speech: "Yummy! I love milkshakes!" },
            { name: "Pizza", icon: "🍕", type: "like", speech: "Pizza is my favourite food!" },
            { name: "Hamburger", icon: "🍔", type: "like", speech: "I love hamburgers!" },
            { name: "Pasta", icon: "🍝", type: "like", speech: "I like pasta very much!" },
            { name: "Ice Cream", icon: "🍦", type: "like", speech: "Ice cream is so sweet and cold!" },
            { name: "Yogurt", icon: "🥛", type: "like", speech: "I like creamy yogurt!" },
            { name: "Eggs", icon: "🥚", type: "dislike", speech: "No eggs for me, please!" },
            { name: "Cheese", icon: "🧀", type: "like", speech: "Cheese is delicious!" },
            { name: "Chocolate", icon: "🍫", type: "like", speech: "Chocolate is my secret treat!" },
            { name: "Sandwich", icon: "🥪", type: "like", speech: "I like big sandwiches!" },
            { name: "Rice", icon: "🍚", type: "like", speech: "Rice is very nice!" },
            { name: "Potato", icon: "🥔", type: "like", speech: "I like potatoes!" },
            { name: "Fish", icon: "🐟", type: "dislike", speech: "I do not like fish at all!" },
            { name: "Bread", icon: "🍞", type: "like", speech: "I like fresh bread!" }
        ];

        // Inyectar diapositivas
        const container = document.getElementById('food-slides-container');
        foods.forEach((food, index) => {
            const btnClass = food.type === 'like' ? 'btn-green' : 'btn-red';
            const btnIcon = food.type === 'like' ? 'fa-thumbs-up' : 'fa-thumbs-down';
            const btnText = food.type === 'like' ? 'I LIKE IT!' : "I DON'T LIKE IT";
            const feedbackText = food.type === 'like' ? 'text-green-600' : 'text-red-600';
            const feedbackWord = food.type === 'like' ? 'Yummy!' : 'Yuck!';

            container.innerHTML += `
                <div class="slide" id="slide-food-${index}">
                    <div class="glass-card p-12 flex flex-col md:flex-row gap-12 items-center">
                        <div class="flex-1 text-center border-r border-gray-100 pr-12">
                            <div class="food-icon float-anim mb-8">${food.icon}</div>
                            <h3 class="text-5xl text-gray-800 mb-6 font-bold">${food.name}</h3>
                            <button onclick="monsterSpeak('${food.speech}')" class="pixar-btn ${btnClass} w-full justify-center">
                                <i class="fa-solid ${btnIcon}"></i> ${btnText}
                            </button>
                        </div>
                        <div class="flex-1 text-center">
                            <p class="text-6xl font-bold ${feedbackText} mb-6">"${feedbackWord}"</p>
                            <div class="speech-bubble">
                                <p class="text-3xl font-bold text-gray-700">"${food.speech}"</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        // Lógica de navegación
        const slideSequence = ['slide-0', 'slide-1', ...foods.map((_, i) => `slide-food-${i}`), 'slide-secret', 'slide-goodbye'];
        let currentIndex = 0;

        function changeSlide(index) {
            if (index < 0 || index >= slideSequence.length) return;
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById(slideSequence[index]).classList.add('active');
            currentIndex = index;
            window.speechSynthesis.cancel(); // Detener voz al cambiar
        }

        function nextSlide() { changeSlide(currentIndex + 1); }
        function prevSlide() { changeSlide(currentIndex - 1); }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {
                    document.body.classList.toggle('pseudo-fullscreen');
                });
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }

        function enterFullAndStart() {
            toggleFullScreen();
            changeSlide(1);
        }

        // LÓGICA DE VOZ MEJORADA
        function monsterSpeak(text) {
            // Intentar usar ResponsiveVoice si está disponible (mejor calidad)
            if (window.responsiveVoice) {
                responsiveVoice.speak(text, "UK English Male", { pitch: 0.8, rate: 0.9 });
            } else {
                // Fallback a voz de sistema si falla la biblioteca
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-GB';
                utterance.pitch = 0.7;
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }

        const monsterSecrets = [
            "I eat pizza with my blue toes!",
            "I sleep in a giant box of chocolate cookies!",
            "My horns are made of stinky blue cheese!",
            "I wash my face with orange juice every morning!",
            "I have a pet spider named Fluffy who loves yogurt!",
            "I like to dance with bananas in the kitchen!"
        ];

        function tellSecret() {
            const secret = monsterSecrets[Math.floor(Math.random() * monsterSecrets.length)];
            document.getElementById('secret-text').innerText = `"${secret}"`;
            monsterSpeak(`Psst! I have a secret. ${secret}`);
        }
    </script>
</body>
</html>
